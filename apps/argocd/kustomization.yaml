apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - namespace.yaml
  - argocd-cluster-project.yaml
  - netsvcs-cluster-project.yaml
  - nuc10-cluster-project.yaml
  - argocd-cluster-app-set.yaml
  - netsvcs-cluster-app-set.yaml
  - nuc10-cluster-app-set.yaml
  - ingress.yaml

configMapGenerator:
  - behavior: merge
    literals:
      - timeout.reconciliation="30s"
    name: argocd-cm
  - behavior: merge
    literals:
      - server.insecure="true"
    name: argocd-cmd-params-cm
