apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nuc10-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: PruneLast=true
    argocd.argoproj.io/sync-wave: "-2"
spec:
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  description: nuc10-cluster project
  destinations:
    - namespace: '*'
      server: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  sourceRepos:
    - '*'
