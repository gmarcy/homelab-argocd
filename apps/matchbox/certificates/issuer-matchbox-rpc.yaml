apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: matchbox-rpc
  namespace: matchbox
  labels:
    app.kubernetes.io/name: matchbox
    app.kubernetes.io/instance: matchbox
spec:
  secretName: matchbox-rpc
  duration: 8760h0m0s # 1y
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: matchbox-rpc-ca
  dnsNames:
    - matchbox-rpc
    - matchbox-rpc.matchbox
    - matchbox-rpc.matchbox.svc
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
