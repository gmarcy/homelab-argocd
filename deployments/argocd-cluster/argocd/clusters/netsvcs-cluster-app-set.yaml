apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: netsvcs-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
  - git:
      files:
      - path: deployments/netsvcs-cluster/*/deployment-config.yaml
      repoURL: https://github.com/gmarcy/homelab-argocd.git
      requeueAfterSeconds: 20
      revision: ""
      template:
        metadata: {}
        spec:
          destination: {}
          project: ""
  syncPolicy: {}
  template:
    metadata:
      name: netsvcs-cluster-{{ userGivenName }}
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{ appName }}'
    spec:
      destination:
        namespace: '{{ destNamespace }}'
        server: '{{ destServer }}'
      ignoreDifferences:
      - group: argoproj.io
        jsonPointers:
        - /status
        kind: Application
      project: netsvcs-cluster
      source:
        path: '{{ srcPath }}'
        repoURL: '{{ srcRepoURL }}'
        targetRevision: '{{ srcTargetRevision }}'
        plugin:
          name: kustomize-build-with-helm
      syncPolicy:
        automated:
          allowEmpty: true
          prune: true
          selfHeal: true
