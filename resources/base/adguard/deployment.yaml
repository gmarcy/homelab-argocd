---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: adguard
  name: adguard
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard
  template:
    metadata:
      labels:
        app: adguard
    spec:
      hostNetwork: true
      containers:
      - image: docker.io/adguard/adguardhome:v0.107.38
        name: adguard
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /opt/adguardhome/work
          name: data
          subPath: work
        - mountPath: /opt/adguardhome/conf
          name: data
          subPath: conf
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: adguard
        - name: conf
          configMap:
            name: adguard-config
      initContainers:
        - name: copy
          image: busybox:1.36
          command: ["/bin/sh", "-c", "cp /config/*.yaml /opt/adguardhome/conf/"]
          volumeMounts:
          - mountPath: /config/
            name: conf
          - mountPath: /opt/adguardhome/conf
            name: data
            subPath: conf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dnsmasq-dns-forwarder
  name: dnsmasq-dns-forwarder
  namespace: adguard
spec:
  replicas: 0
  selector:
    matchLabels:
      app: dnsmasq-dns-forwarder
  template:
    metadata:
      labels:
        app: dnsmasq-dns-forwarder
    spec:
      hostNetwork: true
      containers:
        - name: dnsmasq
          image: 'quay.io/poseidon/dnsmasq:v0.5.0-28-gd871326'
          args:
            - '--no-daemon'
            - '--log-queries'
            - '--bind-dynamic'
            - '--listen-address=192.168.111.253'
            - '--listen-address=192.168.123.253'
            - '--listen-address=192.168.222.253'
            - '--no-resolv'
            - '--no-hosts'
            - '--server=/home.glenn4u.com/192.168.111.214'
            - '--server=/ipmi.gmarcy.com/192.168.123.214'
            - '--server=/lab.gmarcy.com/192.168.222.214'
            - '--server=/lab10g.gmarcy.com/192.168.234.214'
            - '--server=8.8.8.8'
