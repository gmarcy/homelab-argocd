apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-projects
  namespace: argocd
  labels:
    app.kubernetes.io/name: homelab-projects
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: argoproj.io
    jsonPointers:
    - /status
    kind: Application
  project: default
  source:
    path: projects
    repoURL: https://github.com/gmarcy/homelab-argocd.git
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
    - allowEmpty=true
