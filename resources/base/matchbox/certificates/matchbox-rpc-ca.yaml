apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: matchbox-rpc-ca
  namespace: matchbox
  labels:
    app.kubernetes.io/name: matchbox
    app.kubernetes.io/instance: matchbox
spec:
  secretName: matchbox-rpc-ca
  duration: 87660h0m0s # 10y
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: matchbox-rpc-selfsign
  commonName: ca.rpc.matchbox
  isCA: true
  usages:
    - digital signature
    - key encipherment
    - cert sign
